services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: springboot-despachos
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: ${DB_ENDPOINT}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: unless-stopped